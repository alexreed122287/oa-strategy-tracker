name: Market-close update

on:
  schedule:
    # 21:20 UTC = 5:20pm ET in summer (EDT) / 4:20pm ET in winter (EST) — always after the 4:00pm close
    - cron: "20 21 * * 1-5"
  workflow_dispatch: {}   # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker update
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
        run: python scripts/update_tracker.py

      - name: Commit updated data
        run: |
          git config user.name "tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Market-close update $(date -u +%F)"
            git push
          fi
